<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda - Carrito</title>
    <link rel="stylesheet" href="css/carrito.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>Mi Tienda</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="carrito.html">Carrito (<span id="cart-count">0</span>)</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Mi Carrito</h2>
        <div id="carrito-contenedor">
            <div class="carrito-vacio" id="carrito-vacio">
                <p>Tu carrito está vacío</p>
                <a href="productos.html" class="btn">Ir a comprar</a>
            </div>
            <div class="carrito-lleno" id="carrito-lleno" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="carrito-items">
                    </tbody>
                </table>
                <div class="carrito-total">
                    <h3>Total: $<span id="total">0</span></h3>
                    <button id="finalizar-compra" class="btn">Finalizar Compra</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Mi Tienda. Todos los derechos reservados.</p>
    </footer>

    <script src="js/carrito.js"></script>
    <script src="js/api.js"></script>
</body>
</html>
