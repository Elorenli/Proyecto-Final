<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda - Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>Mi Tienda</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="carrito.html">Carrito (<span id="cart-count">0</span>)</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-login">Iniciar Sesión</button>
                <button class="tab-btn" id="tab-registro">Registrarse</button>
            </div>

            <div id="login-form" class="auth-form active">
                <h2>Iniciar Sesión</h2>
                <form id="form-login">
                    <input type="email" id="login-email" placeholder="Correo electrónico" required>
                    <input type="password" id="login-password" placeholder="Contraseña" required>
                    <button type="submit">Ingresar</button>
                </form>
                <p id="login-error" class="error-message"></p>
            </div>

            <div id="registro-form" class="auth-form">
                <h2>Registrarse</h2>
                <form id="form-registro">
                    <input type="text" id="registro-nombre" placeholder="Nombre completo" required>
                    <input type="email" id="registro-email" placeholder="Correo electrónico" required>
                    <input type="password" id="registro-password" placeholder="Contraseña" required>
                    <input type="text" id="registro-direccion" placeholder="Dirección">
                    <button type="submit">Registrarse</button>
                </form>
                <p id="registro-error" class="error-message"></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Mi Tienda. Todos los derechos reservados.</p>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
</body>
</html>
