<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier - Productos</title>
    <link rel="stylesheet" href="../css/variable.css">
    <link rel="stylesheet" href="../css/productos.css">
</head>
<body>
 
    <div class="benefits-bar">
        <span>✨ Envío Gratuito</span>
        <span>🔄 Devoluciones Gratis</span>
        <span>💰 Sin Cargos Ocultos</span>
    </div>
 
    <header class="header">
        <div class="logo">Atelier</div>

        <div class="search-bar">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" placeholder="Buscar productos..." class="search-input" id="search-input">
        </div>

        <div class="icons">
            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            
            <a href="carrito.html" class="cart-link">
                <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span id="cart-count" class="cart-count">0</span>
            </a>
            
            <button id="darkModeToggle" class="dark-mode-btn">
                <svg class="icon moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="icon sun-icon" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                </svg>
            </button>
        </div>
    </header>
 
    <main>
        <section class="catalogo">
            <h2>Todos los Productos</h2>
            
            <div class="filtros">
                <select id="categoria-filtro" class="filtro-select">
                    <option value="todos">Todas las categorías</option>
                    <option value="ropa">Ropa</option>
                    <option value="accesorios">Accesorios</option>
                    <option value="calzado">Calzado</option>
                </select>
            </div>

            <div class="productos-grid" id="productos-grid"> 
            </div>
        </section>
    </main>
 
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-section">
                <h3>Atelier</h3>
                <p>Moda elegante y atemporal para cada ocasión.</p>
            </div>
            <div class="footer-section">
                <h4>Enlaces</h4>
                <a href="index.html">Inicio</a>
                <a href="productos.html">Productos</a>
                <a href="carrito.html">Carrito</a>
            </div>
            <div class="footer-section">
                <h4>Ayuda</h4>
                <a href="#">Contacto</a>
                <a href="#">Preguntas</a>
                <a href="#">Envíos</a>
            </div>
            <div class="footer-section">
                <h4>Síguenos</h4>
                <a href="#">Instagram</a>
                <a href="#">Facebook</a>
                <a href="#">TikTok</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 Atelier | Todos los derechos reservados</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
